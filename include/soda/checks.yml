checks for yt_api:
  - missing_count("Video_ID") = 0
  - duplicate_count("Video_ID") = 0

  - failed rows:
      name: Check if the number of likes is greater than the number of views
      fail condition: '"Likes_Count" > "Video_Views"'

  - failed rows:
      name: Check if the number of comments is greater than the number of views
      fail condition: '"Comments_Count" > "Video_Views"'